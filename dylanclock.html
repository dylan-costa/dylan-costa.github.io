<!DOCTYPE html>
<html>
<head>
    <title>Exam Clock</title>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.1.9/lib/p5.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css?family=Open+Sans');

        body {
            margin: 0;
            background-color: #f5f5f5;
            font-family: "Open Sans", sans-serif;
            overflow: hidden;
        }

        #backButton {
            position: absolute;
            top: 25px;
            left: 25px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background-color: #003366;
            color: white;
            cursor: pointer;
            font-size: 18px;
            font-family: "Open Sans", sans-serif;
        }

        #backButton:hover {
            background-color: #00509e;
        }
    </style>
</head>

<body>

<button id="backButton"
        onclick="window.location.href='courseresources.html'">
    ← Return to Course Resources
</button>

<script>

function setup() {
    createCanvas(windowWidth, windowHeight);
    textAlign(CENTER, CENTER);
}

function draw() {

    background('#f5f5f5');

    let h = hour();
    let m = minute();
    let s = second();

    let suffix = "AM";

    if (h >= 12) suffix = "PM";
    if (h > 12) h -= 12;
    if (h === 0) h = 12;

    h = nf(h, 2);
    m = nf(m, 2);
    s = nf(s, 2);

    // Large centered card
    fill(255);
    stroke(220);
    strokeWeight(2);

    let cardWidth = min(width * 0.95, 1600);
    let cardHeight = 650;

    rectMode(CENTER);
    rect(width / 2, height / 2, cardWidth, cardHeight, 20);

    noStroke();

    // Title
    //fill(90);
    //textSize(100);
    //text("Clock", width / 2, height / 2 - 220);

    // Main clock
    fill(20);
    textSize(350);
    text(`${h}:${m}:${s}`, width / 2, height / 2);

    // AM / PM
    fill(100);
    textSize(70);
    text(suffix, width / 2, height / 2 + 180);

    // Date
    fill(120);
    textSize(30);

    let today = new Date();
    let dateString = today.toLocaleDateString(undefined, {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    });

    text(dateString, width / 2, height / 2 + 260);
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}

</script>

</body>
</html>
